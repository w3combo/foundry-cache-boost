name: Foundry Cache Boost
description:
  Speed up forge test on forked networks by reusing Foundry RPC cache data
author: w3combo

# Add your action's branding here. This will appear on the GitHub Marketplace.
branding:
  icon: zap
  color: blue

# Define your inputs here.
inputs:
  block:
    description: Block number or tag used to scope cache behavior
    required: true
    default: latest
  storage-input-path:
    description: Path to a JSON file describing address to storage slots mapping
    required: false
    default: .github/storage-input.json
  rpc-endpoints-json:
    description: JSON object mapping chain names to RPC URLs
    required: true
  cache-key-prefix:
    description: Prefix used for GitHub cache restore/save keys
    required: false
    default: foundry-cache-boost

runs:
  using: node24
  main: dist/index.js
  post: dist/post.js
  post-if: success()
