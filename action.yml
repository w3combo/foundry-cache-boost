name: Foundry Cache Boost
description: Speed up forge test on forked networks by reusing Foundry RPC cache data
author: w3combo

# Add your action's branding here. This will appear on the GitHub Marketplace.
branding:
  icon: zap
  color: blue

# Define your inputs here.
inputs:
  block:
    description: Block number or tag, or a JSON object mapping chain names to block numbers/tags
    required: true
    default: latest
  rpc-endpoints-json:
    description: JSON object mapping chain names to RPC URLs
    required: true
  cache-key-prefix:
    description: Prefix used for GitHub cache restore/save keys
    required: false
    default: foundry-cache-boost

outputs:
  resolved-block-numbers-json:
    description: JSON object mapping each chain name to its resolved block number in decimal format

runs:
  using: node24
  main: dist/index.js
  post: dist/post.js
  post-if: success()
