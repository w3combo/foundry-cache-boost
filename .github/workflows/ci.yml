name: Continuous Integration

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Dependencies
        id: npm-ci
        run: npm ci

      - name: Check Format
        id: npm-format-check
        run: npm run format:check

      - name: Lint
        id: npm-lint
        run: npm run lint

      - name: Test
        id: npm-ci-test
        run: npm run ci-test

  test-action:
    name: GitHub Actions Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Prepare Action Inputs
        id: prepare-inputs
        run: |
          mkdir -p .github
          echo '{"chains":{}}' > .github/storage-input.ci.json

      - name: Test Local Action
        id: test-action
        uses: ./
        with:
          block: latest
          storage-input-path: .github/storage-input.ci.json
          rpc-endpoints-json: '{"mainnet":"http://127.0.0.1:8545"}'
          cache-key-prefix: foundry-cache-boost-ci-${{ github.run_id }}-${{ github.run_attempt }}
